name: Sync Discord Server

on:
  push:
    branches: [main]
    paths:
      - "config/**.yaml"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print planned changes without applying them"
        type: boolean
        default: true
      allow_delete:
        description: "Delete Discord entities not present in config"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Discord server
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: |
          ARGS=""

          # Dry-run: always on for workflow_dispatch with dry_run=true;
          # never on for push (push = live sync intent)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi

          # Allow-delete: opt-in only; never enabled on push
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.allow_delete }}" == "true" ]]; then
            ARGS="$ARGS --allow-delete"
          fi

          python -m src.sync $ARGS
